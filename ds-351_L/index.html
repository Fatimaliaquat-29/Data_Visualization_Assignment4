<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Electronics Sales Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --grid-line: #334155;
            --tooltip-bg: rgba(15, 23, 42, 0.9);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: var(--text-main);
        }

        header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 1rem;
        }

        #dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .chart-container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .chart-container#line-chart {
            grid-column: span 2;
        }

        .chart-container h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: center;
            color: var(--text-main);
        }

        .axis text {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            fill: var(--text-muted);
        }

        .axis path,
        .axis line {
            stroke: var(--grid-line);
        }

        .grid line {
            stroke: var(--grid-line);
            stroke-dasharray: 4,4;
        }
        
        .grid path {
            stroke-width: 0;
        }

        /* Tooltip styling */
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: opacity 0.2s;
            border: 1px solid var(--grid-line);
            z-index: 100;
        }
        
        /* Interactive classes */
        .dimmed {
            opacity: 0.2;
            transition: opacity 0.2s;
        }
        
        .highlighted {
            opacity: 1;
            transition: opacity 0.2s;
        }

    </style>
</head>
<body>

    <header>
        <h1>Global Retail Sales Analysis 2023</h1>
        <p>Interactive dashboard analyzing revenue, profit, and units sold across product categories.</p>
    </header>
    
    <div id="dashboard">
        <div class="chart-container" id="line-chart">
            <h2>Total Revenue Over Time</h2>
        </div>
        <div class="chart-container" id="bar-chart">
            <h2>Total Revenue by Category</h2>
        </div>
        <div class="chart-container" id="scatter-plot">
            <h2>Units Sold vs. Profit per Order</h2>
        </div>
    </div>
    
    <div id="tooltip" class="tooltip"></div>

    <script>
        // Constants & Dimensions
        const colorScale = d3.scaleOrdinal()
            .domain(["Electronics", "Clothing", "Home"])
            .range(["#3b82f6", "#10b981", "#f59e0b"]);

        const tooltip = d3.select("#tooltip");

        // Load Data
        d3.csv("sales_data.csv").then(data => {
            // Preprocess Data
            data.forEach(d => {
                d.Revenue = +d.Revenue;
                d.Profit = +d.Profit;
                d.Units = +d.Units;
            });

            // Aggregate Data for Charts
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            
            // Monthly Aggregation for Line Chart
            const revenueByMonthMap = d3.rollup(data, v => d3.sum(v, leaf => leaf.Revenue), d => d.Month);
            const monthlyData = months.map(m => ({ Month: m, Revenue: revenueByMonthMap.get(m) || 0 }));

            // Category Aggregation for Bar Chart
            const revenueByCategoryMap = d3.rollup(data, v => d3.sum(v, leaf => leaf.Revenue), d => d.Category);
            const categoryData = Array.from(revenueByCategoryMap, ([Category, Revenue]) => ({ Category, Revenue }));

            // Render Charts
            drawLineChart(monthlyData);
            drawBarChart(categoryData);
            drawScatterPlot(data);

            // -------------------------------------------------------------
            // LINE CHART
            // -------------------------------------------------------------
            function drawLineChart(dataset) {
                const margin = {top: 20, right: 30, bottom: 40, left: 60};
                const width = document.getElementById('line-chart').clientWidth - margin.left - margin.right - 40;
                const height = 300 - margin.top - margin.bottom;

                const svg = d3.select("#line-chart")
                    .append("svg")
                    .attr("width", width + margin.left + margin.right)
                    .attr("height", height + margin.top + margin.bottom)
                    .append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);

                // Scales
                const x = d3.scalePoint()
                    .domain(months)
                    .range([0, width])
                    .padding(0.5);

                const y = d3.scaleLinear()
                    .domain([0, d3.max(dataset, d => d.Revenue) * 1.1])
                    .nice()
                    .range([height, 0]);

                // Axes
                svg.append("g")
                    .attr("class", "axis x-axis")
                    .attr("transform", `translate(0,${height})`)
                    .call(d3.axisBottom(x));

                svg.append("g")
                    .attr("class", "axis y-axis")
                    .call(d3.axisLeft(y).ticks(5).tickFormat(d => "$" + d / 1000 + "k"));

                // Gridlines
                svg.append("g")
                    .attr("class", "grid")
                    .call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(""));

                // Line generator
                const line = d3.line()
                    .x(d => x(d.Month))
                    .y(d => y(d.Revenue))
                    .curve(d3.curveMonotoneX);

                // Path
                svg.append("path")
                    .datum(dataset)
                    .attr("fill", "none")
                    .attr("stroke", "var(--accent)")
                    .attr("stroke-width", 3)
                    .attr("d", line);

                // Points with hover effects
                svg.selectAll(".dot")
                    .data(dataset)
                    .enter().append("circle")
                    .attr("class", "dot")
                    .attr("cx", d => x(d.Month))
                    .attr("cy", d => y(d.Revenue))
                    .attr("r", 5)
                    .attr("fill", "var(--bg-color)")
                    .attr("stroke", "var(--accent)")
                    .attr("stroke-width", 2)
                    .on("mouseover", function(event, d) {
                        d3.select(this).attr("r", 8).attr("fill", "var(--accent)");
                        tooltip.style("opacity", 1)
                            .html(`<strong>${d.Month}</strong><br/>Revenue: $${d.Revenue.toLocaleString()}`)
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mousemove", function(event) {
                        tooltip.style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", function() {
                        d3.select(this).attr("r", 5).attr("fill", "var(--bg-color)");
                        tooltip.style("opacity", 0);
                    });
            }

            // -------------------------------------------------------------
            // BAR CHART
            // -------------------------------------------------------------
            function drawBarChart(dataset) {
                const margin = {top: 20, right: 20, bottom: 40, left: 60};
                const width = document.getElementById('bar-chart').clientWidth - margin.left - margin.right - 40;
                const height = 300 - margin.top - margin.bottom;

                const svg = d3.select("#bar-chart")
                    .append("svg")
                    .attr("width", width + margin.left + margin.right)
                    .attr("height", height + margin.top + margin.bottom)
                    .append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);

                const x = d3.scaleBand()
                    .domain(dataset.map(d => d.Category))
                    .range([0, width])
                    .padding(0.3);

                const y = d3.scaleLinear()
                    .domain([0, d3.max(dataset, d => d.Revenue) * 1.1])
                    .nice()
                    .range([height, 0]);

                svg.append("g")
                    .attr("class", "axis x-axis")
                    .attr("transform", `translate(0,${height})`)
                    .call(d3.axisBottom(x));

                svg.append("g")
                    .attr("class", "axis y-axis")
                    .call(d3.axisLeft(y).ticks(5).tickFormat(d => "$" + d / 1000 + "k"));
                    
                svg.append("g")
                    .attr("class", "grid")
                    .call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(""));

                // Bars with interactivity
                svg.selectAll(".bar")
                    .data(dataset)
                    .enter().append("rect")
                    .attr("class", "bar")
                    .attr("x", d => x(d.Category))
                    .attr("y", d => y(d.Revenue))
                    .attr("width", x.bandwidth())
                    .attr("height", d => height - y(d.Revenue))
                    .attr("fill", d => colorScale(d.Category))
                    .attr("rx", 4)
                    .on("mouseover", function(event, d) {
                        // Tooltip
                        tooltip.style("opacity", 1)
                            .html(`<strong>${d.Category}</strong><br/>Total Revenue: $${d.Revenue.toLocaleString()}`)
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");

                        // Highlight interactions across charts
                        d3.selectAll(".bar").classed("dimmed", b => b.Category !== d.Category);
                        d3.selectAll(".scatter-dot").classed("dimmed", b => b.Category !== d.Category);
                    })
                    .on("mousemove", function(event) {
                        tooltip.style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", function() {
                        tooltip.style("opacity", 0);
                        d3.selectAll(".bar").classed("dimmed", false);
                        d3.selectAll(".scatter-dot").classed("dimmed", false);
                    });
            }

            // -------------------------------------------------------------
            // SCATTER PLOT
            // -------------------------------------------------------------
            function drawScatterPlot(dataset) {
                const margin = {top: 20, right: 20, bottom: 40, left: 50};
                const width = document.getElementById('scatter-plot').clientWidth - margin.left - margin.right - 40;
                const height = 300 - margin.top - margin.bottom;

                const svg = d3.select("#scatter-plot")
                    .append("svg")
                    .attr("width", width + margin.left + margin.right)
                    .attr("height", height + margin.top + margin.bottom)
                    .append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);

                const x = d3.scaleLinear()
                    .domain([0, d3.max(dataset, d => d.Units) * 1.1])
                    .nice()
                    .range([0, width]);

                const y = d3.scaleLinear()
                    .domain([0, d3.max(dataset, d => d.Profit) * 1.1])
                    .nice()
                    .range([height, 0]);

                svg.append("g")
                    .attr("class", "axis x-axis")
                    .attr("transform", `translate(0,${height})`)
                    .call(d3.axisBottom(x));
                    
                // X axis label
                svg.append("text")
                    .attr("text-anchor", "end")
                    .attr("x", width)
                    .attr("y", height + margin.top + 15)
                    .attr("fill", "var(--text-muted)")
                    .style("font-size", "12px")
                    .text("Units Sold");

                svg.append("g")
                    .attr("class", "axis y-axis")
                    .call(d3.axisLeft(y).ticks(5).tickFormat(d => "$" + d / 1000 + "k"));
                    
                // Y axis label
                svg.append("text")
                    .attr("text-anchor", "end")
                    .attr("transform", "rotate(-90)")
                    .attr("y", -margin.left + 15)
                    .attr("x", 0)
                    .attr("fill", "var(--text-muted)")
                    .style("font-size", "12px")
                    .text("Profit ($)");

                svg.append("g")
                    .attr("class", "grid")
                    .call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(""));
                svg.append("g")
                    .attr("class", "grid")
                    .attr("transform", `translate(0,${height})`)
                    .call(d3.axisBottom(x).ticks(5).tickSize(-height).tickFormat(""));

                // Dots
                svg.selectAll(".scatter-dot")
                    .data(dataset)
                    .enter().append("circle")
                    .attr("class", "scatter-dot")
                    .attr("cx", d => x(d.Units))
                    .attr("cy", d => y(d.Profit))
                    .attr("r", 6)
                    .attr("fill", d => colorScale(d.Category))
                    .attr("opacity", 0.8)
                    .attr("stroke", "white")
                    .attr("stroke-width", 0.5)
                    .on("mouseover", function(event, d) {
                        d3.select(this)
                            .attr("r", 9)
                            .attr("stroke", "white")
                            .attr("stroke-width", 2);

                        tooltip.style("opacity", 1)
                            .html(`<strong>${d.Month} - ${d.Category}</strong><br/>Units: ${d.Units}<br/>Profit: $${d.Profit.toLocaleString()}`)
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                            
                        // Highlight same category across charts
                        d3.selectAll(".bar").classed("dimmed", b => b.Category !== d.Category);
                        d3.selectAll(".scatter-dot").classed("dimmed", b => b.Category !== d.Category);
                    })
                    .on("mousemove", function(event) {
                        tooltip.style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", function() {
                        d3.select(this)
                            .attr("r", 6)
                            .attr("stroke", "white")
                            .attr("stroke-width", 0.5);
                        tooltip.style("opacity", 0);
                        
                        d3.selectAll(".bar").classed("dimmed", false);
                        d3.selectAll(".scatter-dot").classed("dimmed", false);
                    });
            }

            // Handle window resize for responsiveness
            window.addEventListener('resize', () => {
                d3.select("#line-chart").select("svg").remove();
                d3.select("#bar-chart").select("svg").remove();
                d3.select("#scatter-plot").select("svg").remove();
                
                drawLineChart(monthlyData);
                drawBarChart(categoryData);
                drawScatterPlot(data);
            });
        }).catch(err => {
            console.error("Error loading CSV data: ", err);
            document.getElementById('dashboard').innerHTML = `<h3 style="color: red; text-align: center; grid-column: span 2;">Failed to load data. Please ensure 'sales_data.csv' is in the same directory and you are running this on a local server.</h3>`;
        });
    </script>
</body>
</html>
